services:
  kb-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-research-kb:latest
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      KB_CACHE_DIR: /home/bun/.cache/ai-research-kb
      KB_STATEFUL_SESSIONS: "false"
      KB_ENABLE_WRITES: "false"
    healthcheck:
      test: ["CMD", "bun", "-e", "const res = await fetch('http://127.0.0.1:3000/health'); if (!res.ok) process.exit(1);"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
